services:
  app:
    build:
      context: .
      args:
        VITE_UTM5_BASE_URL: ${VITE_UTM5_BASE_URL}
        VITE_US_BASE_URL: ${VITE_US_BASE_URL}
        VITE_DADATA_TOKEN: ${VITE_DADATA_TOKEN}
        VITE_SUPABASE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_SUPABASE_ANON_KEY}
    ports:
      - "3000:80"
    restart: unless-stopped
